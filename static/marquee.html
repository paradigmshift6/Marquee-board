<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Tracker</title>
    <link rel="stylesheet" href="/static/marquee.css">
</head>
<body>
    <div class="tracker">
        <div class="header">
            <span class="dot"></span>
            <span class="title">FLIGHT TRACKER</span>
            <span class="count" id="count"></span>
        </div>
        <div class="marquee-container">
            <div class="marquee-content" id="marquee">Scanning the skies...</div>
        </div>
        <div class="flight-list" id="flight-list"></div>
    </div>
    <script src="/static/marquee.js"></script>
</body>
</html>
