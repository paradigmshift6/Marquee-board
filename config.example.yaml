# Marquee Flight Tracker Configuration
# Copy this file to config.yaml and update with your coordinates.

location:
  latitude: 37.7749        # Your latitude (get from Google Maps)
  longitude: -122.4194     # Your longitude
  radius_miles: 5           # Bounding box radius around your location
  local_airport: null        # ICAO code of your nearest airport (e.g. "KSFO") — infers arrival/departure

polling:
  interval_seconds: 12      # Minimum 10s for anonymous OpenSky access
  min_altitude_feet: 500    # Ignore ground traffic
  max_altitude_feet: 45000  # Ignore very high altitude
  approach_only: false       # Set true to only show descending aircraft (landing approaches)

display:
  backend: terminal          # terminal | web
  scroll_speed: 0.08         # Seconds per scroll step (lower = faster)
  cycle_interval: 8          # Seconds per aircraft before cycling
  idle_message: "Scanning the skies..."

web:
  host: 0.0.0.0
  port: 5000

# Optional: Create a free account at https://opensky-network.org
# then go to Account > API Clients to create an API client.
# This enables route lookups (origin/destination airports).
opensky:
  client_id: null             # e.g. "you@email.com-api-client"
  client_secret: null         # your API client secret

enrichment:
  cache_dir: data
  cache_ttl_hours: 168       # Re-download reference databases weekly

# LED matrix dimensions — must match your physical panel
renderer:
  width: 64
  height: 32                  # Common sizes: 32 (64x32 panel) or 64 (64x64 panel)
  brightness: 80              # 0-100
  gpio_slowdown: 4            # Increase to 5 if you see flickering
  hardware_mapping: adafruit-hat  # adafruit-hat | adafruit-hat-pwm | regular

flights:
  enabled: true

# Optional: OpenWeatherMap — https://openweathermap.org/api
weather:
  enabled: false
  api_key: null
  poll_interval: 300          # Seconds between weather updates
  units: imperial             # imperial | metric

# Optional: Google Calendar — see README for OAuth2 setup
calendar:
  enabled: false
  credentials_file: credentials.json
  token_file: data/calendar_token.json
  calendar_id: primary
  lookahead_hours: 24
  poll_interval: 60

# Schedule: automatically turn the board on/off at certain times
schedule:
  enabled: false              # Set true to enable active-hours schedule
  active_start: "06:30"       # HH:MM local time — board turns on
  active_end: "18:00"         # HH:MM local time — board turns off
